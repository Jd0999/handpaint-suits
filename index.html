<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leady Handmade Suits | Acrylic Paint</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #fff5f8;
      text-align: center;
      color: #333;
    }

    header {
      background: linear-gradient(to right, #ff4d6d, #ff99ac);
      color: white;
      padding: 30px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 5px 0 0;
      font-size: 18px;
    }

    h2 {
      color: #ff4d6d;
      margin: 30px 0 20px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 0 10px;
    }

    .gallery img {
      width: 200px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .btn {
      display: inline-block;
      margin: 30px 0;
      padding: 15px 30px;
      background: #25D366;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      font-size: 18px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #1ebe5d;
    }

    footer {
      background: #333;
      color: white;
      padding: 15px 0;
      margin-top: 40px;
    }

    /* Lightbox */
    #lightbox {
      position: fixed;
      display: none;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
    }

    @media(max-width: 600px) {
      .gallery img {
        width: 45%;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Leady Handmade Suits</h1>
  <p>Acrylic Painted Designer Collection</p>
</header>

<h2>Our Collection</h2>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2" alt="Handmade Suit 1">
  <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" alt="Handmade Suit 2">
  <img src="https://images.unsplash.com/photo-1593032465171-8c6e2bcd7e2d" alt="Handmade Suit 3">
  <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990" alt="Handmade Suit 4">
  <img src="https://images.unsplash.com/photo-1621859431090-d1a3b5eae9b5" alt="Handmade Suit 5">
  <img src="https://images.unsplash.com/photo-1618354621373-1d85c5b3a990" alt="Handmade Suit 6">
</div>

<a class="btn" href="https://wa.me/919988110999" target="_blank">Order on WhatsApp</a>

<!-- Lightbox -->
<div id="lightbox">
  <img src="" alt="Zoomed Image">
</div>

<footer>
  <p>Leady Handmade Suits | Acrylic Painted with Love</p>
</footer>

<script>
  const gallery = document.querySelectorAll('.gallery img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = lightbox.querySelector('img');

  gallery.forEach(img => {
    img.addEventListener('click', () => {
      lightbox.style.display = 'flex';
      lightboxImg.src = img.src;
    });
  });

  lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
  });
</script>

</body>
</html>
<div class="gallery">
  <img src="suit1.jpg">
  <img src="suit2.jpg">
  <img src="suit3.jpg">
</div>
